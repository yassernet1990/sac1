<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAC Identity Admin</title><style>*{box-sizing:border-box}body{margin:0;background:#07111d;color:#fff;font-family:Arial,sans-serif}.wrap{width:min(1180px,calc(100% - 32px));margin:auto;padding:60px 0}h1{font-size:42px;margin:0 0 10px}p{color:#9fb0bf;margin:0 0 34px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.card{border:1px solid #ffffff24;background:#0d1b29;padding:0;text-align:right;color:#fff;cursor:pointer;overflow:hidden;transition:.25s}.card:hover{transform:translateY(-5px);border-color:#fff}.preview{height:150px;padding:22px;display:flex;align-items:end;justify-content:space-between}.preview b{font-size:26px}.dots{display:flex;gap:7px}.dots i{width:22px;height:22px;border-radius:50%;display:block}.meta{padding:18px 22px;background:#0a1622}.meta strong{display:block;font-size:18px}.meta span{color:#96aabc;font-size:13px}.active{outline:3px solid #fff}@media(max-width:700px){.grid{grid-template-columns:1fr}h1{font-size:32px}}</style></head><body><div class="wrap"><h1>هويات SAC Logistics</h1><p>اضغط على أي هوية لتطبيقها فورًا والعودة إلى الموقع.</p><div class="grid" id="g"></div></div><script src="theme.js"></script><script>const names={industrial:['Industrial Lime','صناعية حديثة'],royal:['Royal Gold','فخامة مؤسسية'],desert:['Desert Logistics','هوية صحراوية'],ocean:['Ocean Tech','تقنية زرقاء'],steel:['Steel Orange','معدات ثقيلة'],emerald:['Emerald Motion','خضراء حيوية'],crimson:['Crimson Power','قوة حمراء'],minimal:['Minimal White','نظافة وبساطة'],violet:['Violet Future','مستقبلية جريئة'],saudi:['Saudi Premium','هوية سعودية']},g=document.getElementById('g'),cur=localStorage.getItem('sac-theme')||'industrial';Object.entries(THEMES).forEach(([k,v])=>{let b=document.createElement('button');b.className='card '+(k===cur?'active':'');b.innerHTML=`<div class="preview" style="background:linear-gradient(135deg,${v[2]},${v[1]})"><b>SAC</b><span class="dots"><i style="background:${v[0]}"></i><i style="background:${v[1]}"></i><i style="background:${v[5]}"></i></span></div><div class="meta"><strong>${names[k][0]}</strong><span>${names[k][1]}</span></div>`;b.onclick=()=>{applyTheme(k);location.href='index.html'};g.appendChild(b)});</script></body></html>
